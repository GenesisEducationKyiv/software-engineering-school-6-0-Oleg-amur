name: CI/CD workflow

on: 
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.3
          cache: true

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1

      - name: unit tests
        run: go test -v ./...

      - name: build image
        run: docker build -t release-notifier .
